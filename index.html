<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đua ngựa - Menu</title>
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        background-color: #2c3e50;
        color: white;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url('assets/bg.png'); /* If available, or just use color */
        background-size: cover;
      }
      .menu-card {
        background: rgba(0, 0, 0, 0.7);
        padding: 2rem;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        text-align: center;
        min-width: 350px;
      }
      .btn-custom {
        padding: 15px 30px;
        font-size: 1.2rem;
        margin: 10px 0;
        width: 100%;
        transition: transform 0.2s;
      }
      .btn-custom:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>

    <div class="menu-card">
      <h1 class="mb-4 text-warning fw-bold">ĐUA NGỰA ONLINE</h1>
      <p class="mb-4 text-light">Chọn chế độ chơi</p>

      <a href="host/index.html" class="btn btn-danger btn-custom fw-bold">
        TẠO PHÒNG (HOST)
      </a>

      <a href="client/index.html" class="btn btn-success btn-custom fw-bold">
        THAM GIA (CLIENT)
      </a>
    </div>

  </body>
</html>
